{% extends "layout.html" %}

{% block title %}Sömnapp &mdash; Framsida{% endblock %}
{% block content %}

<p>
  Det finns {{ user_count }} användare 
  och {{ post_count }} inlägg. <br>
<a href="/search">Sök efter inlägg</a>
</p>

<p>
  <select name="filter">
    <option value="new">Nyaste</option>
    <option value="popular">Populära</option>
    <option value="feed">Vänner</option>
  </select>
</p>

<h2></h2>
<ul>
  {% for post in posts %}
  <li><b><a href="/post/{{ post.id }}">{{ post.title }}</a></b> 
    av <a href="/user/{{ post.user_id }}">{{ post.username }}</a></li>
  {% endfor %}
</ul>

{% endblock %}
